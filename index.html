<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小小桥牌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap');
:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --felt:#1d5c35;--felt2:#247a46;
  --gold:#c9a84c;--text:#ddd8ce;--text2:#9a978f;
  --accent:#e2c44d;--red:#c0392b;--card:#fffef8;
  --card-sh:rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
:root{
  --cw:min(5.8vw,72px);
  --ch:min(8.4vw,104px);
  --cf:min(1.4vw,1.3em);
  --tcw:min(4.2vw,58px);
  --tch:min(6.1vw,84px);
  --hand-h:calc(var(--ch) + 20px);
}

/* LOBBY */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;position:fixed;inset:0;padding:24px;gap:6px;background:radial-gradient(ellipse at 50% 30%,#182818,var(--bg))}
#lobby h1{font-size:2.2em;color:var(--gold);letter-spacing:6px;margin-bottom:6px;text-shadow:0 0 20px rgba(201,168,76,.25)}
#lobby p{color:var(--text2);font-size:.8em;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px;margin:5px 0;width:256px}
.fg label{font-size:.77em;color:var(--text2);font-weight:600}
.fg input{padding:10px 14px;border:1px solid var(--bg3);border-radius:7px;background:var(--bg2);color:var(--text);font-size:.95em;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--gold)}
#lobby button{margin-top:12px;padding:12px 0;background:var(--felt);color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;width:256px;font-weight:600;transition:background .2s}
#lobby button:hover{background:var(--felt2)}

/* ── GAME SHELL: full-screen absolute layout ── */
#game{display:none;position:fixed;inset:0}


/* ── Full-screen felt: #board IS the table ── */
#board{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 48%,#28884e 0%,var(--felt) 58%,#134a2a 100%);
}
/* Player zones: absolute on each edge */
.pz{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;overflow:visible;z-index:2;box-sizing:border-box}
.pz.top   {top:8px;left:50%;transform:translateX(-50%)}
.pz.bottom{bottom:calc(var(--hand-h) + 4px);left:50%;transform:translateX(-50%);flex-direction:column-reverse}
.spectating .pz.bottom{bottom:8px}
.pz.left  {left:8px;top:0;bottom:0;flex-direction:column;justify-content:center}
.pz.right {right:8px;top:0;bottom:0;flex-direction:column;justify-content:center}

/* player label */
.plbl{padding:4px 12px;border-radius:4px;background:rgba(0,0,0,.75);font-size:.95em;font-weight:700;color:var(--gold);white-space:nowrap}
.plbl.on{outline:2px solid var(--accent);color:var(--accent)}
.plbl.dummy-badge{color:#7ee8a2}
.ptk{display:none}

/* card rows — ALL zones horizontal, flat layout */
.cds{display:flex;flex-wrap:nowrap;overflow:visible;gap:0}

/* All opponent/dummy cards: uniform size, no overlap */
.mc{background:var(--card);border-radius:6px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;line-height:1.1;flex-shrink:0;box-shadow:1px 2px 6px var(--card-sh);width:var(--cw);height:var(--ch);font-size:var(--cf)}
.mc.b{background:linear-gradient(135deg,#3a5ba0,#2c4a85)!important;color:transparent}
.mc.b::after{content:'';display:block;width:55%;height:65%;border:1px solid rgba(255,255,255,.15);border-radius:3px}
.mc.playable{border:3px solid var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(226,196,77,.5);position:relative;z-index:10}
/* Left/right: horizontal row */
.pz.left .cds{flex-direction:row}
.pz.right .cds{flex-direction:row}

/* CENTER trick zone — absolutely centered */
.table-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;z-index:2;
}
.tz{width:min(38vw,360px);height:min(36vh,320px);position:relative;flex-shrink:0}
.tc{position:absolute;width:var(--tcw);height:var(--tch);background:var(--card);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:calc(var(--cf)*0.9);font-weight:700;line-height:1.1;box-shadow:2px 4px 10px var(--card-sh)}
.tc.pos-top   {top:0;   left:50%;transform:translateX(-50%)}
.tc.pos-bottom{bottom:0;left:50%;transform:translateX(-50%)}
.tc.pos-left  {top:50%; left:0; transform:translateY(-50%)}
.tc.pos-right {top:50%; right:0;transform:translateY(-50%)}
.cl{display:none}

/* ── AUCTION: always-visible right panel + center overlay during bidding ── */
#auc-panel{
  position:absolute;top:8px;right:8px;
  background:rgba(15,18,26,.92);border:1px solid #2a3040;border-radius:8px;
  padding:10px 16px;min-width:200px;font-size:.95em;z-index:40;pointer-events:all;
}
#auc-panel.hidden{display:none}
#auc-panel table,#auc-overlay table{border-collapse:collapse;width:100%;pointer-events:all}
#auc-panel th,#auc-overlay th{color:var(--gold);padding:4px 10px;border-bottom:1px solid #2a3040;font-weight:700;text-align:center}
#auc-panel td,#auc-overlay td{padding:4px 10px;text-align:center;pointer-events:all;cursor:default}

#auc-overlay{
  display:none;position:absolute;top:200px;left:50%;transform:translateX(-50%);
  background:rgba(15,18,26,.95);border:1px solid #2a3040;border-radius:10px;
  padding:10px 14px;z-index:40;min-width:220px;font-size:.8em;pointer-events:all;
}
#auc-overlay.show{display:block}

/* ── STATUS badge top-left ── */
#status-badge{
  position:absolute;top:8px;left:8px;z-index:10;
  background:rgba(0,0,0,.75);border-radius:8px;padding:8px 14px;
  font-size:.95em;color:var(--text2);line-height:1.8;
}
.tbtn{padding:6px 12px;background:var(--bg3);border:1px solid #333;color:var(--text2);border-radius:4px;cursor:pointer;font-size:.85em}

/* ── Bottom-right contract + score info ── */
#game-info{
  position:absolute;bottom:10px;right:10px;z-index:10;
  background:rgba(0,0,0,.75);border:1px solid #333;border-radius:8px;
  padding:8px 16px;font-size:1em;font-weight:700;color:var(--text);
  text-align:right;line-height:1.8;
}
#game-info .contract{color:var(--gold);font-size:1.1em}
#game-info .tricks{color:var(--text2);font-size:.9em}
.tbtn:hover{background:#2a3548}
.tbtn.go{background:var(--felt);color:#fff;border-color:var(--felt)}

/* ── Centered seat-prompt when spectating ── */
#seat-prompt{
  display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:15;text-align:center;
  background:rgba(0,0,0,.72);border:1px solid var(--gold);
  border-radius:14px;padding:22px 36px;
}
#seat-prompt.show{display:block}
#seat-prompt p{color:var(--text2);font-size:.85em;margin-bottom:14px}
#seat-prompt button{
  padding:12px 32px;background:var(--gold);color:#111;
  border:none;border-radius:8px;font-size:1.05em;font-weight:700;cursor:pointer;
}
#seat-prompt button:hover{background:var(--accent)}

/* ── MY HAND fixed bottom overlay ── */
#myhand-bar{
  position:absolute;bottom:10px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:0;padding:0 10px;
  background:none;
  overflow-x:auto;z-index:5;
}
.suit-grp{display:flex;gap:0;margin:0}
.myc{width:var(--cw);height:var(--ch);background:var(--card);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:var(--cf);font-weight:700;line-height:1.15;box-shadow:0 3px 10px var(--card-sh);cursor:default;transition:transform .15s,box-shadow .15s;user-select:none;flex-shrink:0}
.myc.playable{cursor:pointer;border:3px solid var(--accent);box-shadow:0 0 0 3px rgba(226,196,77,.5),0 4px 16px rgba(0,0,0,.5);position:relative;z-index:10}
.myc.playable:hover{transform:translateY(-14px);box-shadow:0 0 0 3px rgba(226,196,77,.7),0 12px 28px rgba(0,0,0,.6)}
.myc .sym{font-size:1.2em}.myc .rk{font-size:1.4em;font-weight:800}
.ss{color:#111}.sh{color:var(--red)}.sd{color:#d05000}.sc{color:#1a7a42}

/* ── BID BOX right-side panel ── */
#bidbox{display:none;position:absolute;bottom:calc(var(--hand-h) + 4px);left:50%;transform:translateX(-50%);background:rgba(15,18,26,.96);border:1px solid #444;border-radius:12px;padding:10px;z-index:30;width:min(360px,92vw);box-shadow:0 4px 24px rgba(0,0,0,.7)}
#alert-row{display:none;margin-top:6px;gap:4px;align-items:center}
#alert-row.show{display:flex}
#alert-input{flex:1;padding:6px 10px;border:1px solid #555;border-radius:6px;background:#111;color:var(--text);font-size:.82em;outline:none}
#alert-input:focus{border-color:var(--accent)}
#alert-btn{padding:8px 12px;background:#7a3a00;color:#ffb347;border:none;border-radius:6px;font-size:.82em;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
#alert-btn.active{background:#c05000;color:#fff}
/* Toast notification bottom-right */
#alert-toast{
  display:none;position:fixed;bottom:80px;right:16px;z-index:200;
  background:rgba(20,14,0,.95);border:1px solid #c05000;border-radius:10px;
  padding:12px 18px;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.6);
}
#alert-toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#alert-toast .at-label{color:#ffb347;font-size:.75em;font-weight:700;margin-bottom:4px}
#alert-toast .at-bid{color:var(--accent);font-size:1em;font-weight:800}
#alert-toast .at-msg{color:var(--text);font-size:.85em;margin-top:4px}
/* Alert popup when clicking bid in auction table */
#alert-popup{
  display:none;position:fixed;bottom:80px;right:16px;z-index:201;
  background:rgba(20,14,0,.97);border:1px solid #c05000;border-radius:10px;
  padding:14px 18px;max-width:300px;
}
#alert-popup.show{display:block}
#alert-popup .ap-title{color:#ffb347;font-size:.78em;font-weight:700;margin-bottom:6px}
#alert-popup .ap-bid{color:var(--accent);font-size:1.1em;font-weight:800}
#alert-popup .ap-msg{color:var(--text);font-size:.88em;margin-top:6px;line-height:1.5}
#alert-popup button{margin-top:10px;padding:5px 16px;background:var(--bg3);color:var(--text2);border:none;border-radius:5px;cursor:pointer;font-size:.8em}
#bidgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:8px}
.bb{padding:7px 1px;border:none;border-radius:4px;background:var(--bg3);color:var(--text);font-size:.74em;cursor:pointer;text-align:center;font-weight:700;transition:background .12s;transition:background .12s,color .12s}
.bb:hover:not(:disabled){background:var(--felt)}.bb:disabled{opacity:.2;cursor:not-allowed}
.bb.pass{background:#3d4a5c;color:#aaa;padding:8px 10px;font-size:.82em}.bb.dbl{background:#8e3b3b;color:#fff;padding:8px 14px;font-size:.9em;font-weight:800}.bb.rdbl{background:#2b5ea0;color:#fff;padding:8px 10px;font-size:.9em;font-weight:800}.bb.selected{background:var(--accent)!important;color:#111!important;transform:scale(1.08)}
#bact{display:flex;gap:4px;justify-content:center;margin-top:4px}
#confirm-btn{padding:8px 16px;background:var(--gold);color:#111;border:none;border-radius:6px;font-size:.85em;font-weight:800;cursor:pointer;min-width:80px}
#confirm-btn:disabled{opacity:.25;cursor:not-allowed}
#confirm-btn:not(:disabled):hover{background:var(--accent)}

/* Chat */
#chat-btn{position:absolute;bottom:10px;left:10px;z-index:20;padding:8px 14px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:8px;color:var(--text2);cursor:pointer;font-size:.85em}
#chat-btn:hover{background:rgba(0,0,0,.9);color:var(--text)}
#chat-panel{display:none;position:absolute;bottom:56px;left:10px;z-index:50;width:280px;background:rgba(15,18,26,.97);border:1px solid #333;border-radius:10px;overflow:hidden;flex-direction:column}
#chat-panel.show{display:flex}
#chat-log{flex:1;max-height:220px;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.chat-msg{font-size:.78em;line-height:1.4;word-break:break-all}
.chat-msg .cn{color:var(--gold);font-weight:700;margin-right:4px}
.chat-msg .ct{color:var(--text)}
#chat-input-row{display:flex;border-top:1px solid #222;padding:6px}
#chat-input{flex:1;background:#111;border:none;border-radius:4px;padding:5px 8px;color:var(--text);font-size:.82em;outline:none}
#chat-send{padding:5px 10px;background:var(--felt);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.8em;margin-left:4px}
/* Score popup */
#spop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#spop.show{display:flex}
#spop .bx{background:var(--bg2);border:2px solid var(--gold);border-radius:14px;padding:22px 30px;text-align:center;max-width:340px;width:90vw}
#spop h2{color:var(--gold);margin-bottom:6px;font-size:1.05em}
#spop .sv{font-size:1.9em;margin:8px 0;font-weight:800}
#spop .dt{color:var(--text2);font-size:.82em;line-height:1.6}
#spop button{margin-top:12px;padding:9px 26px;background:var(--felt);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.92em;font-weight:600}

/* History */
#hp{display:none;position:fixed;top:0;right:0;width:min(360px,90vw);height:100dvh;background:var(--bg);border-left:2px solid var(--bg3);z-index:50;overflow-y:auto;padding:14px}
#hp.show{display:block}
#hp h2{color:var(--gold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:1em}
#hp .x{cursor:pointer;font-size:1.2em;color:var(--text2);background:none;border:none}
.hi{background:var(--bg2);border-radius:7px;padding:10px;margin-bottom:8px;font-size:.78em}
.hi .bn{color:var(--gold);font-weight:700}.hi .ct{color:var(--accent)}.hi .dt{margin-top:3px;color:var(--text2);font-size:.88em;line-height:1.5}

/* Seat picker */
#seat-pick{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;align-items:center;justify-content:center}

/* Explain request prompt (shown to bidder when opponent asks for explanation) */
#explain-prompt{
  display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:202;
  background:rgba(20,14,0,.97);border:1px solid var(--gold);border-radius:10px;
  padding:16px 20px;width:min(320px,90vw);box-shadow:0 4px 20px rgba(0,0,0,.6);
}
#explain-prompt.show{display:block}
#explain-prompt .ep-title{color:var(--gold);font-size:.82em;font-weight:700;margin-bottom:6px}
#explain-prompt .ep-bid{color:var(--accent);font-size:1.1em;font-weight:800;margin-bottom:8px}
#explain-prompt input{width:100%;padding:8px 10px;border:1px solid #555;border-radius:6px;background:#111;color:var(--text);font-size:.85em;outline:none;box-sizing:border-box}
#explain-prompt input:focus{border-color:var(--accent)}
#explain-prompt .ep-btns{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
#explain-prompt .ep-btns button{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:.82em;font-weight:600}
#explain-prompt .ep-send{background:var(--gold);color:#111}
#explain-prompt .ep-skip{background:var(--bg3);color:var(--text2)}
#seat-pick.show{display:flex}
#seat-pick .bx{background:var(--bg2);border:2px solid var(--bg3);border-radius:14px;padding:20px 26px;text-align:center;width:min(320px,90vw)}
#seat-pick h3{color:var(--gold);margin-bottom:14px;font-size:.95em}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sbtn{padding:11px;border:1px solid var(--bg3);border-radius:8px;background:var(--bg3);color:var(--text);cursor:pointer;font-size:.9em;font-weight:600;transition:all .15s}
.sbtn:hover:not(:disabled){background:var(--felt);border-color:var(--felt)}
.sbtn:disabled{opacity:.3;cursor:not-allowed}
.sbtn-cancel{padding:8px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:.85em}


</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>♠ 小小桥牌 ♣</h1>
  <p>中国科大桥牌协会 2026 实验规则</p>
  <div class="fg"><label>昵称</label><input id="nn" placeholder="输入昵称" maxlength="12" autocomplete="off"></div>
  <div class="fg"><label>房间号</label><input id="rid" placeholder="输入房间号" maxlength="20" autocomplete="off"></div>
  <button onclick="joinGame()">进入房间</button>
</div>

<!-- GAME -->
<div id="game">
  <div id="board">
    <div class="pz top"   id="pz-top">  <div class="plbl" id="lbl-top">—</div><div class="cds" id="cds-top"></div><div class="ptk" id="tk-top"></div></div>
    <div class="pz left"  id="pz-left"> <div class="plbl" id="lbl-left">—</div><div class="cds" id="cds-left"></div><div class="ptk" id="tk-left"></div></div>
    <div class="table-center"><div class="tz" id="tz"></div><div class="cl" id="cl"></div></div>
    <div class="pz right" id="pz-right"><div class="plbl" id="lbl-right">—</div><div class="cds" id="cds-right"></div><div class="ptk" id="tk-right"></div></div>
    <div class="pz bottom" id="pz-bottom"><div class="plbl" id="lbl-bottom">—</div><div class="cds" id="cds-bottom"></div><div class="ptk" id="tk-bottom"></div></div>
  </div>
  <div id="status-badge">
    <span id="ib">连接中...</span><br>
    <button class="tbtn go" id="sbtn" style="display:none" onclick="manualStart()">开始发牌</button>
    <button class="tbtn" onclick="showSeatPick()">换座位</button>
    <button class="tbtn" onclick="toggleHistory()">📋历史</button>
  </div>
  <div id="seat-prompt"><p>你还没有入座</p><button onclick="showSeatPick()">点击入座</button></div>
  <div id="auc-panel" class="hidden"></div>
  <div id="auc-overlay"></div>
  <div id="myhand-bar"></div>
  <div id="bidbox">
    <div id="bidgrid"></div>
    <div id="bact">
      <button class="bb pass" onclick="selectBid('Pass')">Pass</button>
      <button class="bb dbl" id="db" onclick="selectBid('X')" disabled>X</button>
      <button class="bb rdbl" id="rb" onclick="selectBid('XX')" disabled>XX</button>
      <button id="alert-btn" onclick="toggleAlertInput()">❗Alert</button>
      <button id="confirm-btn" onclick="confirmBid()" disabled>确认</button>
    </div>
    <div id="alert-row">
      <input id="alert-input" placeholder="Alert说明（发给对手）" maxlength="60">
    </div>
  </div>
  <div id="game-info" style="display:none"></div>
  <button id="chat-btn" onclick="toggleChat()">💬 聊天</button>
  <div id="chat-panel">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="发送消息..." maxlength="80" onkeydown="if(event.key==='Enter')sendChat()">
      <button id="chat-send" onclick="sendChat()">发送</button>
    </div>
  </div>
  <div id="alert-toast"><div class="at-label">❗ Alert</div><div class="at-bid" id="at-bid"></div><div class="at-msg" id="at-msg"></div></div>
  <div id="alert-popup"><div class="ap-title">❗ Alert 说明</div><div class="ap-bid" id="ap-bid"></div><div class="ap-msg" id="ap-msg"></div><button onclick="closeAlertPopup()">关闭</button></div>
  <div id="explain-prompt"><div class="ep-title">🔍 对手请求解释你的叫品</div><div class="ep-bid" id="ep-bid"></div><input id="ep-input" placeholder="输入这个叫品的含义..." maxlength="80" onkeydown="if(event.key==='Enter')submitExplain()"><div class="ep-btns"><button class="ep-skip" onclick="submitExplain('')">跳过</button><button class="ep-send" onclick="submitExplain()">发送</button></div></div>
  <div id="spop"><div class="bx"><h2 id="st"></h2><div class="dt" id="sd"></div><div class="sv" id="sv"></div><button onclick="closeScore()">下一局</button></div></div>
  <div id="hp"><h2>历史记录<button class="x" onclick="toggleHistory()">×</button></h2><div id="hl"></div></div>
</div>

<!-- Seat picker overlay -->
<div id="seat-pick">
  <div class="bx">
    <h3>选择座位</h3>
    <div class="sg" id="seat-btns"></div>
    <button class="sbtn-cancel" onclick="closeSeatPick()">取消</button>
  </div>
</div>

<script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const SU=['C','D','H','S'];
const SY={S:'♠',H:'♥',D:'♦',C:'♣'};
const RANKS=['8','9','10','J','Q','K','A']; // index = rank order (low→high)
const SE=['N','E','S','W'];
const SN={N:'北',E:'东',S:'南',W:'西'};
const BS=['C','D','H','S','NT'],LV=[1,2,3,4];
const TN={1:4,2:5,3:6,4:7};

// Relative seat layout: given mySeat, what compass goes in each visual slot?
// Spectators view from South perspective.
function viewSeat(){return mySeat||'S';}
function layoutFor(me){
  // Returns {top,bottom,left,right} compass seats
  const vs=me||'S';
  const idx=SE.indexOf(vs);
  const opp=SE[(idx+2)%4];
  const lho=SE[(idx+1)%4];
  const rho=SE[(idx+3)%4];
  return {bottom:vs,top:opp,left:lho,right:rho};
}

// ─── State ───────────────────────────────────────────────────────────────────
let myId=Math.random().toString(36).slice(2,10);
let mySeat=null,myName='',mq=null,rt='',isHost=false,hostId=null;
let trickProcessing=false;

// peers: { peerId: { name, lastSeen } }  — NO seat info here, seats live only in S.players
let peers={};

let S={
  phase:'waiting',dealer:0,
  hands:{N:[],E:[],S:[],W:[]},
  players:{N:null,E:null,S:null,W:null},
  auction:[],contract:null,
  currentTrick:[],trickWins:{NS:0,EW:0},
  trickLead:null,turnSeat:null,dummy:null,
  boardNum:0,history:[],allHands:null,
  dummyRevealed:false,
  _v:0 // version counter: incremented on every mutation
};

// ─── Utilities ───────────────────────────────────────────────────────────────
function log(m){console.log('[mb]',m);if(S.phase==='waiting'){const b=document.getElementById('ib');if(b)b.textContent=m;}}
function sc(s){return s==='H'?'sh':s==='D'?'sd':s==='S'?'ss':'sc';}
function scd(s){return s==='H'?'#c0392b':s==='D'?'#c0392b':s==='S'?'#bbb':'#2ecc71';}

function sortHand(hand){
  hand.sort((a,b)=>{
    const ds=SU.indexOf(b.suit)-SU.indexOf(a.suit);
    if(ds!==0)return ds;
    return RANKS.indexOf(b.rank)-RANKS.indexOf(a.rank);
  });
}

// ─── MQTT ────────────────────────────────────────────────────────────────────
function ms(msg){if(mq&&mq.connected){msg._from=myId;mq.publish(rt,JSON.stringify(msg));}}

// Host broadcasts state. Bumps version so clients can skip duplicates.
function bS(){if(isHost){S._v=(S._v||0)+1;ms({type:'full_state',state:S});}}

// ─── Derive mySeat from S.players (single source of truth) ──────────────────
// Call this after every S update. mySeat is NEVER set directly except here.
function syncMySeat(){
  let found=null;
  for(const s of SE){
    if(S.players[s]&&S.players[s].peerId===myId){found=s;break;}
  }
  mySeat=found;
  // Persist for refresh recovery
  try{const o=JSON.parse(sessionStorage.getItem('mb-session')||'{}');o.mySeat=mySeat;sessionStorage.setItem('mb-session',JSON.stringify(o));}catch(e){}
}

// ─── Join ────────────────────────────────────────────────────────────────────
window.joinGame=function(){
  myName=document.getElementById('nn').value.trim()||'玩家';
  const rid=document.getElementById('rid').value.trim();
  if(!rid){alert('请输入房间号');return;}

  // Restore session if same room
  const saved=sessionStorage.getItem('mb-session');
  if(saved){try{const o=JSON.parse(saved);if(o.rid===rid){myId=o.myId;myName=o.myName;}}catch(e){}}

  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  rt='minibridge/room/'+rid;
  sessionStorage.setItem('mb-session',JSON.stringify({rid,myId,mySeat:null,myName}));

  log('正在连接...');

  const brokers=[
    'wss://broker.emqx.io:8084/mqtt',
    'wss://broker.hivemq.com:8884/mqtt',
  ];
  let brokerIdx=0;
  let wasConnected=false;
  let reconnectTimer=null;

  function tryConnect(){
    const url=brokers[brokerIdx%brokers.length];
    log(wasConnected?'重连中...':'连接中...');
    if(mq){try{mq.end(true);}catch(e){}}
    // Stable clientId so broker recognizes us on reconnect and kicks the stale session
    mq=mqtt.connect(url,{clientId:'mb_'+myId,clean:true,keepalive:60,connectTimeout:8000,reconnectPeriod:0});

    mq.on('connect',()=>{
      if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
      mq.subscribe(rt,e=>{
        if(e){log('订阅失败');return;}
        wasConnected=true;
        log('已连接');
        // Announce presence — this is all we do. Host will respond with full_state.
        ms({type:'hello',name:myName});
        // After brief delay, if no one else responded, I'm the first → become host
        setTimeout(()=>{
          if(!hostId){
            hostId=myId;isHost=true;
            log('我是房主');
            rA();
          }
        },800);
        bBG();
      });
    });
    mq.on('message',onM);
    mq.on('error',()=>{});
    mq.on('close',()=>{
      if(wasConnected){
        log('连接断开，重连中...');
        // Retry same broker quickly, switch after longer timeout
        if(!reconnectTimer)reconnectTimer=setTimeout(tryConnect,3000);
        setTimeout(()=>{if(mq&&!mq.connected){brokerIdx++;if(!reconnectTimer)reconnectTimer=setTimeout(tryConnect,1000);}},15000);
      } else {
        brokerIdx++;
        if(brokerIdx<6){log('切换服务器...');setTimeout(tryConnect,2000);}
        else log('连接失败，请刷新');
      }
    });
  }
  tryConnect();

  // ── Heartbeat: 8s interval handles everything ──
  setInterval(()=>{
    if(!mq||!mq.connected){
      if(wasConnected&&!reconnectTimer){log('连接异常');tryConnect();}
      rA(); // update disconnect indicator
      return;
    }
    // 1. Ping: tell everyone I'm alive
    ms({type:'ping',name:myName});

    // 2. Host: broadcast authoritative state (clients skip if version unchanged)
    if(isHost)bS();

    // 3. Peer liveness: remove silent peers (>60s — tolerant of network hiccups)
    const now=Date.now();let changed=false;
    for(const pid of Object.keys(peers)){
      if(pid===myId)continue;
      if(now-peers[pid].lastSeen>60000){delete peers[pid];changed=true;}
    }
    if(changed){
      const wasH=isHost;
      eH();
      if(isHost&&!wasH){log('房主切换');bS();}
      rA();
    }
  },8000);

  const sv=localStorage.getItem('minibridge-history');
  if(sv)try{S.history=JSON.parse(sv);}catch(e){}
};

// ─── Host election: lowest peerId wins ───────────────────────────────────────
function eH(){
  const a=[myId,...Object.keys(peers)];a.sort();
  hostId=a[0];isHost=(hostId===myId);
}

// ─── Message handler ─────────────────────────────────────────────────────────
function onM(_,p){
  let d;try{d=JSON.parse(p.toString());}catch(e){return;}
  if(d._from===myId)return;

  // Track peer liveness for ALL message types
  if(d._from){
    if(!peers[d._from])peers[d._from]={name:d.name||'?'};
    peers[d._from].lastSeen=Date.now();
    if(d.name)peers[d._from].name=d.name;
  }

  // ── hello: new peer arrived ──
  if(d.type==='hello'){
    eH();
    // Host sends current state to everyone (new peer will pick it up)
    if(isHost)bS();
    rA();
  }

  // ── full_state: authoritative state from host ──
  else if(d.type==='full_state'){
    if(isHost)return; // I am the host, I don't accept state from others
    if(d._from!==hostId&&hostId)return; // only accept from known host

    // Version check: skip if same version (heartbeat duplicate)
    const newV=d.state._v||0;
    const oldV=S._v||0;
    if(newV>0&&newV<=oldV)return;

    // Accept state
    const prevPhase=S.phase;
    const h=S.history;
    S=d.state;
    if(h.length>S.history.length)S.history=h;
    if(S.dummyRevealed===undefined)S.dummyRevealed=false;
    trickProcessing=(S.currentTrick&&S.currentTrick.length===4);

    // Derive mySeat from authoritative S.players — NEVER set it any other way
    syncMySeat();
    rA();

    // Show score popup when phase transitions to scoring
    if(S.phase==='scoring'&&prevPhase!=='scoring'){
      showScoreFromState();
    }
  }

  // ── Actions: only host processes these ──
  else if(d.type==='bid'){
    if(isHost&&S.phase==='bidding'&&d.seat===S.turnSeat)pB(d.seat,d.bid,d.alert);
  }
  else if(d.type==='play_card'){
    if(isHost&&S.phase==='playing'&&!trickProcessing){
      const isDeclPlay=S.contract&&d._from&&
        S.players[S.contract.declarer]&&
        S.players[S.contract.declarer].peerId===d._from&&
        d.seat===S.dummy&&S.turnSeat===S.dummy;
      if(d.seat===S.turnSeat||isDeclPlay)pC(d.seat,d.card);
    }
  }
  else if(d.type==='request_deal'){if(isHost)sNB();}

  // ── take_seat: client requests a seat change ──
  else if(d.type==='take_seat'){
    if(!isHost)return;
    if(S.phase!=='waiting'){bS();return;} // reject during game
    if(d.seat){
      const occ=S.players[d.seat];
      if(occ&&occ.peerId!==d._from){bS();return;} // seat taken
      // Clear this peer from any other seat
      for(const s of SE){
        if(s!==d.seat&&S.players[s]&&S.players[s].peerId===d._from)S.players[s]=null;
      }
      S.players[d.seat]={peerId:d._from,name:d.name};
    } else {
      // Going spectator
      for(const s of SE){
        if(S.players[s]&&S.players[s].peerId===d._from)S.players[s]=null;
      }
    }
    syncMySeat();cR();rA();bS();
  }

  // ── Alert system ──
  else if(d.type==='request_explain'){
    if(d.seat===mySeat&&S.auction[d.aucIdx]){
      showExplainPrompt(d.aucIdx,d.bid,d.fromName||'对手');
    }
  }
  else if(d.type==='provide_explain'){
    if(isHost&&d.aucIdx!=null&&S.auction[d.aucIdx]&&d.msg){
      S.auction[d.aucIdx].alert=d.msg;
      rA();bS();
    }
  }

  // ── Chat & misc ──
  else if(d.type==='chat'){appendChat(d);}
  else if(d.type==='ping'){eH();} // peer tracking already done above
  else if(d.type==='request_state'){if(isHost)bS();}
}

// ─── Game logic ───────────────────────────────────────────────────────────────
function cR(){if(SE.filter(s=>S.players[s]).length===4&&S.phase==='waiting')sNB();}

function sNB(){
  trickProcessing=false;
  S.boardNum++;
  S.dealer=(S.boardNum===1)?0:(S.dealer+1)%4;
  S.phase='bidding';S.auction=[];S.contract=null;
  S.currentTrick=[];S.trickWins={NS:0,EW:0};
  S.trickLead=null;S.dummy=null;S.turnSeat=SE[S.dealer];
  S.dummyRevealed=false;
  const dk=[];
  for(let s of SU)for(let r of RANKS)dk.push({suit:s,rank:r});
  for(let i=dk.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dk[i],dk[j]]=[dk[j],dk[i]];}
  S.hands={N:dk.slice(0,7),E:dk.slice(7,14),S:dk.slice(14,21),W:dk.slice(21,28)};
  for(let s of SE)sortHand(S.hands[s]);
  S.allHands=JSON.parse(JSON.stringify(S.hands));
  rA();bS();
}

function gLC(){for(let i=S.auction.length-1;i>=0;i--){const b=S.auction[i].bid;if(b!=='Pass'&&b!=='X'&&b!=='XX')return{...S.auction[i],index:i};}return null;}
function bv(b){if(b==='Pass'||b==='X'||b==='XX')return-1;return parseInt(b[0])*10+BS.indexOf(b.slice(1));}

function iV(seat,bid){
  if(bid==='Pass')return true;
  const lc=gLC();
  if(bid==='X'){
    if(!lc)return false;
    if((SE.indexOf(seat)%2)===(SE.indexOf(lc.seat)%2))return false;
    for(let i=lc.index+1;i<S.auction.length;i++)if(S.auction[i].bid==='X'||S.auction[i].bid==='XX')return false;
    for(let i=lc.index+1;i<S.auction.length;i++)if(S.auction[i].bid!=='Pass')return false;
    return true;
  }
  if(bid==='XX'){
    let x=-1;
    for(let i=S.auction.length-1;i>=0;i--){if(S.auction[i].bid==='X'){x=i;break;}if(S.auction[i].bid!=='Pass')break;}
    if(x===-1)return false;
    return(SE.indexOf(seat)%2)!==(SE.indexOf(S.auction[x].seat)%2);
  }
  return lc?bv(bid)>bv(lc.bid):true;
}

function pB(seat,bid,alertMsg){
  S.auction.push({seat,bid,alert:alertMsg||undefined});
  const a=S.auction;
  if(a.length>=4){
    if(a.slice(-3).every(x=>x.bid==='Pass')&&a.length>3&&a.some(x=>x.bid!=='Pass'&&x.bid!=='X'&&x.bid!=='XX')){fA();return;}
    if(a.slice(-4).every(x=>x.bid==='Pass')){S.phase='scoring';S.contract=null;rB(0,null);rA();bS();sS('全Pass','本局流局',0);return;}
  }
  S.turnSeat=SE[(SE.indexOf(seat)+1)%4];
  rA();bS();

}

function autoPlayLastTrick(){
  // Each player has exactly 1 card. Play them in order with 700ms delay.
  let delay=400;
  let seat=S.turnSeat;
  for(let i=0;i<4;i++){
    const s=seat;
    setTimeout(()=>{
      if(S.phase==='playing'&&S.hands[s]&&S.hands[s].length===1){
        pC(s,S.hands[s][0]);
      }
    },delay);
    delay+=700;
    seat=SE[(SE.indexOf(seat)+1)%4];
  }
}

function fA(){
  const lc=gLC(),bid=lc.bid,lv=parseInt(bid[0]),su=bid.slice(1),side=SE.indexOf(lc.seat)%2;
  let dec=null;
  for(let a of S.auction)if(a.bid!=='Pass'&&a.bid!=='X'&&a.bid!=='XX'&&a.bid.slice(1)===su&&SE.indexOf(a.seat)%2===side){dec=a.seat;break;}
  let db=false,rd=false;
  for(let i=S.auction.length-1;i>=0;i--){
    if(S.auction[i].bid==='XX'){rd=true;break;}
    if(S.auction[i].bid==='X'){db=true;break;}
    if(S.auction[i].bid!=='Pass')break;
  }
  S.contract={level:lv,suit:su,doubled:db,redoubled:rd,declarer:dec};
  const di=SE.indexOf(dec);
  S.dummy=SE[(di+2)%4];
  S.trickLead=SE[(di+1)%4];
  S.turnSeat=S.trickLead;
  S.phase='playing';
  S.currentTrick=[];
  S.dummyRevealed=false; // dummy hidden until opening lead played
  rA();bS();
}

function pC(seat,card){
  if(trickProcessing)return; // FIX: prevent double-fire
  const h=S.hands[seat];
  const idx=h.findIndex(c=>c.suit===card.suit&&c.rank===card.rank);
  if(idx===-1)return;
  h.splice(idx,1);
  S.currentTrick.push({seat,card});

  // FIX: reveal dummy after the first card of the first trick is played
  if(!S.dummyRevealed&&S.currentTrick.length>=1){
    S.dummyRevealed=true;
  }

  if(S.currentTrick.length===4){
    trickProcessing=true; // lock
    const w=tW(S.currentTrick,S.contract.suit);
    const ws=(SE.indexOf(w)%2===0)?'NS':'EW';
    S.trickWins[ws]++;
    rA();bS();
    setTimeout(()=>{
      S.currentTrick=[];
      S.trickLead=w;
      S.turnSeat=w;
      trickProcessing=false; // unlock
      if(S.trickWins.NS+S.trickWins.EW===7)eP();
      else if(isHost&&S.trickWins.NS+S.trickWins.EW===6){
        rA();bS();
        autoPlayLastTrick();
      }
      else{rA();bS();}
    },1200);
    return;
  }
  S.turnSeat=SE[(SE.indexOf(seat)+1)%4];
  rA();bS();
}

function tW(tr,ts){
  const ls=tr[0].card.suit;let best=tr[0];
  for(let i=1;i<tr.length;i++){
    const c=tr[i];
    if(ts!=='NT'){
      if(c.card.suit===ts&&best.card.suit!==ts)best=c;
      else if(c.card.suit===ts&&best.card.suit===ts&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;
      else if(c.card.suit!==ts&&c.card.suit===ls&&best.card.suit===ls&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;
    }else{
      if(c.card.suit===ls&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;
    }
  }
  return best.seat;
}

function eP(){
  S.phase='scoring';
  const c=S.contract,ds=(SE.indexOf(c.declarer)%2===0)?'NS':'EW',dt=S.trickWins[ds];
  const nd=TN[c.level],made=dt-nd,score=cSc(c,made);
  rB(score,c,dt);rA();bS();
  sS(fC(c),'庄家: '+SN[c.declarer]+' · '+(made>=0?(made===0?'完成':'超'+made+'墩'):'宕'+(-made))+' · '+dt+'/7墩',score);
}

function cSc(c,made){
  const{level:l,suit:s,doubled:d,redoubled:r}=c;
  if(made>=0){
    let tp=s==='NT'?30+(l-1)*20:l*20;
    let m=d?2:r?4:1;tp*=m;
    let b=tp>=50?250:50;
    if(l===4)b=750;
    let e=d?100:r?200:0;
    let o=made>0?(!d&&!r?made*20:d?made*100:made*200):0;
    return tp+b+e+o;
  }
  const dn=-made;
  if(!d&&!r)return-(dn*50);
  if(d){let p=0;if(dn>=1)p+=100;if(dn>=2)p+=200;if(dn>=3)p+=200;for(let i=4;i<=dn;i++)p+=300;return-p;}
  let p=0;if(dn>=1)p+=200;if(dn>=2)p+=400;if(dn>=3)p+=400;for(let i=4;i<=dn;i++)p+=600;return-p;
}

function rB(sc2,ct,dt){
  S.history.push({boardNum:S.boardNum,hands:S.allHands,auction:[...S.auction],contract:ct?{...ct}:null,declarerTricks:dt||0,score:sc2,players:JSON.parse(JSON.stringify(S.players)),timestamp:new Date().toLocaleString('zh-CN')});
  localStorage.setItem('minibridge-history',JSON.stringify(S.history));
}

// ─── Seat management ─────────────────────────────────────────────────────────
window.showSeatPick=function(){
  // If we haven't received any state from host yet, wait
  if(!isHost&&S._v===0){
    alert('正在同步房间状态，请稍候再试');
    return;
  }
  const el=document.getElementById('seat-pick');
  const bg=document.getElementById('seat-btns');
  bg.innerHTML='';
  const inGame=S.phase!=='waiting';
  const opts=[...SE,'旁观'];
  for(let s of opts){
    const b=document.createElement('button');
    b.className='sbtn';
    if(s==='旁观'){
      b.textContent='旁观';
      b.style.gridColumn='1/-1';
      b.disabled=inGame;
      b.onclick=()=>{takeSeat(null);closeSeatPick();};
    } else {
      const occ=S.players[s];
      const mine=occ&&occ.peerId===myId;
      b.textContent=SN[s]+(occ?' ('+occ.name+')':'（空）');
      if(mine)b.style.outline='2px solid var(--accent)';
      // Disable if: game in progress, OR seat taken by someone else
      if(inGame||(occ&&!mine))b.disabled=true;
      b.onclick=()=>{takeSeat(s);closeSeatPick();};
    }
    bg.appendChild(b);
  }
  if(inGame){
    const tip=document.createElement('p');
    tip.style.cssText='color:var(--text2);font-size:.8em;margin-top:8px;text-align:center';
    tip.textContent='游戏进行中，无法换座';
    bg.appendChild(tip);
  }
  el.classList.add('show');
};
window.closeSeatPick=function(){document.getElementById('seat-pick').classList.remove('show');};

function takeSeat(seat){
  if(isHost){
    // Host applies directly
    for(const s of SE){if(S.players[s]&&S.players[s].peerId===myId)S.players[s]=null;}
    if(seat){
      if(S.players[seat]&&S.players[seat].peerId!==myId){rA();return;} // taken
      S.players[seat]={peerId:myId,name:myName};
    }
    syncMySeat();
    cR();rA();bS();
  } else {
    // Non-host: send request. Do NOT touch mySeat — wait for full_state from host.
    ms({type:'take_seat',seat:seat,name:myName});
  }
}

// ─── Manual start ─────────────────────────────────────────────────────────────
window.manualStart=function(){
  if(isHost&&S.phase==='waiting'){
    for(let s of SE)if(!S.players[s])S.players[s]={peerId:'bot-'+s,name:'机器人'+SN[s]};
    sNB();
  }
};

// ─── Rendering ───────────────────────────────────────────────────────────────
function rA(){rTable();rMH();rTr();rAu();rCl();uBB();uTB();}

function uTB(){
  const b=document.getElementById('ib'),sb=document.getElementById('sbtn');
  const sp=document.getElementById('seat-prompt');
  const sc2=SE.filter(s=>S.players[s]).length;
  const disconnected=!mq||!mq.connected;
  const dcTag=disconnected?' ⚠️ 断线重连中':'';
  if(S.phase==='waiting')b.textContent=(Object.keys(peers).length>1?'已连接'+(Object.keys(peers).length-1)+'人 · ':'等待玩家 · ')+sc2+'/4就座'+(mySeat?' · 我:'+SN[mySeat]:' · 旁观中')+(isHost?' · 房主':'')+dcTag;
  else if(S.phase==='bidding')b.textContent='第'+S.boardNum+'局 · 叫牌轮到 '+SN[S.turnSeat]+(mySeat?' · 我:'+SN[mySeat]:' · 旁观中')+dcTag;
  else if(S.phase==='playing')b.textContent='第'+S.boardNum+'局 · '+fC(S.contract)+' · 轮到 '+SN[S.turnSeat]+(!mySeat?' · 旁观中':'')+dcTag;
  else b.textContent='第'+S.boardNum+'局 · 结束'+(!mySeat?' · 旁观中':'')+dcTag;
  if(sb)sb.style.display=(S.phase==='waiting'&&isHost&&sc2>=2)?'inline-block':'none';
  // Show centered seat prompt only when spectating, game not started, AND we have state
  const hasState=isHost||S._v>0;
  if(sp)sp.classList.toggle('show',!mySeat&&S.phase==='waiting'&&hasState);
  document.getElementById('board').classList.toggle('spectating',!mySeat);
}

// Map compass seat to visual position slot
function posOf(compassSeat){
  const lay=layoutFor(viewSeat());
  for(const[pos,cs] of Object.entries(lay))if(cs===compassSeat)return pos;
  return 'top';
}

// Trick position mapping: given the compass seat of the card, return visual pos
function trickPos(compassSeat){
  return posOf(compassSeat); // same mapping
}

function rTable(){
  const lay=layoutFor(viewSeat()); // {top,bottom,left,right} → compass seat
  const isSpectator=!mySeat;
  for(const[pos,seat] of Object.entries(lay)){
    const lblEl=document.getElementById('lbl-'+pos);
    const cdsEl=document.getElementById('cds-'+pos);
    const tkEl=document.getElementById('tk-'+pos);
    if(!lblEl)continue;

    const p=S.players[seat];
    const isDummy=S.dummy===seat;
    const isMe=mySeat===seat; // false for spectators (mySeat is null)

    // Label
    let lblTxt=SN[seat]+(p?' '+p.name:' (空位)');
    if(isDummy&&S.dummyRevealed)lblTxt+=' [明手]';
    lblEl.textContent=lblTxt;
    lblEl.className='plbl'+(S.turnSeat===seat?' on':'')+(isDummy&&S.dummyRevealed?' dummy-badge':'');

    // Tricks
    tkEl.textContent=(S.phase==='playing'||S.phase==='scoring')?S.trickWins[(SE.indexOf(seat)%2===0)?'NS':'EW']+'墩':'';

    // Cards
    cdsEl.innerHTML='';
    if(isMe) continue; // my hand rendered in btm bar (only for seated players)

    const hand=S.hands[seat]||[];

    // Visibility rules:
    const amDeclarer=!!(S.contract&&mySeat===S.contract.declarer);
    const amDummy=!!(S.contract&&mySeat===S.dummy);
    const isDeclarer=(seat===S.contract?.declarer);
    const canSee=isSpectator||
                 (S.phase==='scoring')||
                 (isDummy&&S.dummyRevealed)||
                 (isDeclarer&&amDummy&&S.dummyRevealed);

    // Can declarer click dummy's cards? (never for spectator)
    const isDummyPlayable=!!(S.contract&&amDeclarer&&isDummy&&S.dummyRevealed&&S.turnSeat===seat&&S.phase==='playing'&&!trickProcessing);

    // Sort dummy hand for display (already sorted on deal, maintain)
    // Render by suit groups for dummy (face-up), stacked for opponents (face-down)
    if(canSee){
      // Render face-up hand: flat, no gaps
      for(const card of hand){
        const d=document.createElement('div');
        d.className='mc f '+sc(card.suit);
        d.innerHTML='<span>'+SY[card.suit]+'</span><span>'+card.rank+'</span>';
        if(isDummyPlayable&&iLP(seat,card)){
          d.classList.add('playable');
          d.onclick=((st,cd)=>()=>{
            if(!trickProcessing){
              if(isHost)pC(st,cd);else ms({type:'play_card',seat:st,card:cd});
            }
          })(seat,card);
        }
        cdsEl.appendChild(d);
      }
    } else {
      for(let i=0;i<hand.length;i++){
        const d=document.createElement('div');
        d.className='mc b';
        cdsEl.appendChild(d);
      }
    }
  }
}

function rMH(){
  const el=document.getElementById('myhand-bar');
  el.innerHTML='';
  el.style.display=mySeat?'flex':'none';
  if(!mySeat)return;

  const hand=S.hands[mySeat]||[];
  // FIX: dummy cannot play (declarer controls dummy via table cards)
  const isDummy=S.dummy===mySeat;
  const isMyTurn=S.turnSeat===mySeat&&S.phase==='playing'&&!isDummy&&!trickProcessing;

  for(const card of hand){
    const d=document.createElement('div');
    d.className='myc '+sc(card.suit);
    d.innerHTML='<span class="sym">'+SY[card.suit]+'</span><span class="rk">'+card.rank+'</span>';
    if(isMyTurn&&iLP(mySeat,card)){
      d.classList.add('playable');
      d.onclick=((st,cd)=>()=>{
        if(!trickProcessing){
          if(isHost)pC(st,cd);else ms({type:'play_card',seat:st,card:cd});
        }
      })(mySeat,card);
    }
    el.appendChild(d);
  }
}

function iLP(seat,card){
  if(S.currentTrick.length===0)return true;
  const ls=S.currentTrick[0].card.suit;
  return card.suit===ls||!S.hands[seat].some(c=>c.suit===ls);
}

function rTr(){
  const z=document.getElementById('tz');
  z.innerHTML='';
  for(const p of S.currentTrick){
    const d=document.createElement('div');
    const pos=trickPos(p.seat);
    d.className='tc pos-'+pos+' '+sc(p.card.suit);
    d.innerHTML='<span style="font-size:1.2em">'+SY[p.card.suit]+'</span><span>'+p.card.rank+'</span>';
    z.appendChild(d);
  }
}

function rAu(){
  const panel=document.getElementById('auc-panel');
  const overlay=document.getElementById('auc-overlay');
  const isBidding=S.phase==='bidding';
  const isPlaying=S.phase==='playing';
  if(S.auction.length===0&&!isBidding){panel.classList.add('hidden');overlay.classList.remove('show');return;}
  if(!isBidding&&!isPlaying){panel.classList.add('hidden');overlay.classList.remove('show');return;}

  // Build auction table HTML
  let h='<table><tr>';
  for(let i=0;i<4;i++)h+='<th>'+SN[SE[(S.dealer+i)%4]]+'</th>';
  h+='</tr><tr>';
  const isSpectator=!mySeat;
  for(let i=0;i<S.auction.length;i++){
    const entry=S.auction[i];
    const hasAlert=!!entry.alert;
    const isMine=entry.seat===mySeat;
    const isPartner=mySeat&&!isMine&&(SE.indexOf(entry.seat)%2)===(SE.indexOf(mySeat)%2);
    const isOpp=mySeat&&!isMine&&!isPartner;
    const isNonTrivialBid=entry.bid!=='Pass';

    // Alert mark: spectator sees all, players see opp and own
    const showMark=hasAlert&&(isSpectator||isOpp||isMine);
    const alertMark=showMark?'<span style="color:#ffb347;font-size:.8em">❗</span>':'';
    const myMark=hasAlert&&isMine?'<span style="color:#888;font-size:.7em">(我)</span>':'';
    const bidHtml=fB(entry.bid)+alertMark+myMark;

    if(isSpectator&&isNonTrivialBid&&hasAlert){
      // Spectator: can click any alerted bid to view explanation
      const safeMsg=(entry.alert||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      h+='<td data-auc-idx="'+i+'" data-alert-msg="'+safeMsg+'" data-alert-bid="'+entry.bid+'" data-bid-seat="'+entry.seat+'" onclick="handleAlertTd(this)" style="cursor:pointer;text-decoration:underline dotted #ffb347">'+bidHtml+'</td>';
    } else if(isOpp&&isNonTrivialBid){
      // Opponent's non-Pass bid: always clickable for players
      const safeMsg=hasAlert?(entry.alert||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'):'';
      h+='<td data-auc-idx="'+i+'" data-alert-msg="'+safeMsg+'" data-alert-bid="'+entry.bid+'" data-bid-seat="'+entry.seat+'" onclick="handleAlertTd(this)" style="cursor:pointer;text-decoration:underline dotted '+(hasAlert?'#ffb347':'#666')+'">'+bidHtml+'</td>';
    } else {
      h+='<td>'+bidHtml+'</td>';
    }
    if((i+1)%4===0)h+='</tr><tr>';
  }
  h+='</tr></table>';

  if(isBidding){
    overlay.innerHTML=h;
    overlay.classList.add('show');
    panel.classList.add('hidden');
  } else {
    panel.innerHTML=h;
    panel.classList.remove('hidden');
    overlay.classList.remove('show');
  }
}

function fB(b){
  if(b==='Pass')return'<span style="color:#666">P</span>';
  if(b==='X')return'<span style="color:#e74c3c">X</span>';
  if(b==='XX')return'<span style="color:#5dade2">XX</span>';
  const s=b.slice(1);
  return s==='NT'?b[0]+'NT':b[0]+'<span style="color:'+scd(s)+'">'+SY[s]+'</span>';
}

function rCl(){
  document.getElementById('cl').textContent='';
  const gi=document.getElementById('game-info');
  if(!gi)return;
  if(S.contract&&(S.phase==='playing'||S.phase==='scoring')){
    const ds=(SE.indexOf(S.contract.declarer)%2===0)?'NS':'EW';
    const other=ds==='NS'?'EW':'NS';
    gi.style.display='block';
    const need=TN[S.contract.level];
    gi.innerHTML='<div class="contract">'+fC(S.contract)+'</div>'+
      '<div class="tricks">'+ds+':'+S.trickWins[ds]+'/'+need+' '+other+':'+S.trickWins[other]+'</div>';
  } else {
    gi.style.display='none';
  }
}

function fC(c){
  if(!c)return'';
  let s=c.level+(c.suit==='NT'?'NT':SY[c.suit]);
  if(c.redoubled)s+='XX';else if(c.doubled)s+='X';
  return s+' '+SN[c.declarer];
}

function uBB(){
  const box=document.getElementById('bidbox');
  if(S.phase!=='bidding'||S.turnSeat!==mySeat){box.style.display='none';return;}
  box.style.display='block';
  selectedBid=null;
  document.querySelectorAll('.bb[data-bid]').forEach(b=>{
    b.disabled=!iV(mySeat,b.dataset.bid);
    b.classList.remove('selected');
  });
  document.getElementById('db').disabled=!iV(mySeat,'X');
  document.getElementById('rb').disabled=!iV(mySeat,'XX');
  document.getElementById('confirm-btn').disabled=true;
}

let selectedBid=null;
const alertMap={};  // idx -> {bidHtml, msg}
window.handleAlertTd=function(td){
  const msg=td.getAttribute('data-alert-msg');
  const bid=td.getAttribute('data-alert-bid');
  const aucIdx=parseInt(td.getAttribute('data-auc-idx'));
  const bidSeat=td.getAttribute('data-bid-seat');
  if(msg){
    // Alert exists — show it
    showAlertPopup(fB(bid),msg);
  } else {
    // No alert — send request to the bidder to explain
    ms({type:'request_explain',aucIdx:aucIdx,bid:bid,seat:bidSeat,fromName:myName});
    // Show a brief toast to let requester know the request was sent
    showAlertToast(SN[bidSeat]+' '+fB(bid),'已请求对方解释，等待回复...');
  }
};

function bBG(){
  const g=document.getElementById('bidgrid');
  g.innerHTML='';
  const suitColors={C:'#2ecc71',D:'#e67e22',H:'#e74c3c',S:'#ccc',NT:'#aaa'};
  for(let l of LV)for(let s of BS){
    const bid=l+s,btn=document.createElement('button');
    btn.className='bb';btn.dataset.bid=bid;
    btn.innerHTML=s==='NT'?'<span>'+l+'NT</span>':'<span>'+l+'</span><span style="color:'+suitColors[s]+'">'+SY[s]+'</span>';
    btn.onclick=()=>selectBid(bid);
    g.appendChild(btn);
  }
}

function selectBid(bid){
  if(!mySeat||S.turnSeat!==mySeat)return;
  if(!iV(mySeat,bid))return;
  selectedBid=bid;
  document.querySelectorAll('.bb').forEach(b=>{
    const bval=b.dataset.bid||b.textContent.trim();
    b.classList.toggle('selected',bval===bid);
  });
  document.getElementById('confirm-btn').disabled=false;
}

window.toggleAlertInput=function(){
  const row=document.getElementById('alert-row');
  const btn=document.getElementById('alert-btn');
  const show=!row.classList.contains('show');
  row.classList.toggle('show',show);
  btn.classList.toggle('active',show);
  if(show)document.getElementById('alert-input').focus();
};

function confirmBid(bid){
  bid=bid||selectedBid;
  if(!bid||!mySeat||S.turnSeat!==mySeat||!iV(mySeat,bid))return;
  const alertMsg=document.getElementById('alert-input').value.trim();
  // Reset UI
  selectedBid=null;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('selected'));
  document.getElementById('confirm-btn').disabled=true;
  document.getElementById('alert-row').classList.remove('show');
  document.getElementById('alert-btn').classList.remove('active');
  document.getElementById('alert-input').value='';
  // Submit bid with optional alert
  if(isHost)pB(mySeat,bid,alertMsg);
  else ms({type:'bid',seat:mySeat,bid,alert:alertMsg||undefined});
}

window.makeBid=function(bid){confirmBid(bid);};

let alertToastTimer=null;
function showAlertToast(bidStr,msg){
  const t=document.getElementById('alert-toast');
  document.getElementById('at-bid').innerHTML=bidStr;
  document.getElementById('at-msg').textContent=msg;
  t.classList.add('show');
  if(alertToastTimer)clearTimeout(alertToastTimer);
  alertToastTimer=setTimeout(()=>t.classList.remove('show'),6000);
}

window.closeAlertPopup=function(){document.getElementById('alert-popup').classList.remove('show');};
function showAlertPopup(bidStr,msg){
  document.getElementById('ap-bid').innerHTML=bidStr;
  document.getElementById('ap-msg').textContent=msg;
  document.getElementById('alert-popup').classList.add('show');
};

// ─── Explain request system ──────────────────────────────────────────────────
let pendingExplainIdx=null; // auction index we're being asked to explain
window.submitExplain=function(skip){
  const el=document.getElementById('explain-prompt');
  const input=document.getElementById('ep-input');
  const msg=(skip==='')?'':input.value.trim();
  el.classList.remove('show');
  if(pendingExplainIdx===null)return;
  const idx=pendingExplainIdx;
  pendingExplainIdx=null;
  input.value='';
  if(!msg&&skip==='')return; // skipped, do nothing
  // Send explanation to host (or apply directly if host)
  if(isHost){
    if(S.auction[idx]){
      S.auction[idx].alert=msg;
      rA();bS();
    }
  } else {
    ms({type:'provide_explain',aucIdx:idx,msg:msg});
  }
};
function showExplainPrompt(aucIdx,bid,fromName){
  pendingExplainIdx=aucIdx;
  document.getElementById('ep-bid').innerHTML=fB(bid)+' <span style="color:var(--text2);font-size:.7em">('+fromName+' 请求解释)</span>';
  const input=document.getElementById('ep-input');
  input.value='';
  document.getElementById('explain-prompt').classList.add('show');
  setTimeout(()=>input.focus(),100);
}

// ─── Chat ────────────────────────────────────────────────────────────────────
window.toggleChat=function(){
  const p=document.getElementById('chat-panel');
  p.classList.toggle('show');
  if(p.classList.contains('show'))document.getElementById('chat-input').focus();
};
window.sendChat=function(){
  const inp=document.getElementById('chat-input');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  const msg={type:'chat',name:myName,seat:mySeat,text:txt};
  appendChat(msg);
  ms(msg);
};
function appendChat(d){
  const log=document.getElementById('chat-log');
  if(!log)return;
  const div=document.createElement('div');
  div.className='chat-msg';
  const seatStr=d.seat?SN[d.seat]:'旁观';
  div.innerHTML='<span class="cn">'+seatStr+' '+d.name+':</span><span class="ct">'+d.text.replace(/</g,'&lt;')+'</span>';
  log.appendChild(div);
  log.scrollTop=log.scrollHeight;
  // Flash chat button if panel closed
  const btn=document.getElementById('chat-btn');
  if(btn&&!document.getElementById('chat-panel').classList.contains('show')){
    btn.style.color='var(--accent)';
    setTimeout(()=>btn.style.color='',2000);
  }
}

// ─── Score popup ──────────────────────────────────────────────────────────────
function sS(t,det,sc2){
  document.getElementById('st').textContent=t;
  document.getElementById('sd').textContent=det;
  const v=document.getElementById('sv');
  v.textContent=sc2===0?'—':(sc2>0?'+'+sc2:''+sc2);
  v.style.color=sc2>=0?'#2ecc71':'#e74c3c';
  document.getElementById('spop').classList.add('show');
}
// Reconstruct and show score popup from current state (for non-host clients)
function showScoreFromState(){
  if(!S.contract){
    sS('全Pass','本局流局',0);
    return;
  }
  const c=S.contract;
  const ds=(SE.indexOf(c.declarer)%2===0)?'NS':'EW';
  const dt=S.trickWins[ds];
  const nd=TN[c.level],made=dt-nd,score=cSc(c,made);
  sS(fC(c),'庄家: '+SN[c.declarer]+' · '+(made>=0?(made===0?'完成':'超'+made+'墩'):'宕'+(-made))+' · '+dt+'/7墩',score);
}
window.closeScore=function(){
  document.getElementById('spop').classList.remove('show');
  if(isHost)sNB();else ms({type:'request_deal'});
};

// ─── History ──────────────────────────────────────────────────────────────────
window.toggleHistory=function(){const p=document.getElementById('hp');p.classList.toggle('show');if(p.classList.contains('show'))rH();};
function rH(){
  const l=document.getElementById('hl');
  if(!S.history.length){l.innerHTML='<div style="color:var(--text2)">暂无</div>';return;}
  let h='';
  for(let i=S.history.length-1;i>=0;i--){
    const r=S.history[i];
    const cs=r.contract?fC(r.contract):'全Pass';
    const ss=r.score>0?'+'+r.score:''+r.score;
    let rs='';
    if(r.contract){const m=r.declarerTricks-TN[r.contract.level];rs=m>=0?(m===0?'完成':'超'+m+'墩'):'宕'+(-m);}else rs='流局';
    let hs='';
    if(r.hands)for(let s of SE){const n=r.players[s]?r.players[s].name:SN[s];hs+=SN[s]+'('+n+'): '+r.hands[s].map(c=>SY[c.suit]+c.rank).join(' ')+'<br>';}
    let as='';
    if(r.auction&&r.auction.length)as=r.auction.map(a=>{if(a.bid==='Pass')return'P';if(a.bid==='X'||a.bid==='XX')return a.bid;const su=a.bid.slice(1);return a.bid[0]+(su==='NT'?'NT':SY[su]);}).join('-');
    h+='<div class="hi"><div><span class="bn">第'+r.boardNum+'局</span> · '+r.timestamp+'</div><div class="ct">'+cs+' · '+rs+'</div><div class="res">得分: <span style="color:'+(r.score>=0?'#2ecc71':'#e74c3c')+'">'+ss+'</span></div>'+(as?'<div class="dt">叫牌: '+as+'</div>':'')+'<div class="dt">'+hs+'</div></div>';
  }
  l.innerHTML=h;
}

// ─── Session recovery on load ─────────────────────────────────────────────────
// If sessionStorage has a saved session, pre-fill and show game screen
(function(){
  const saved=sessionStorage.getItem('mb-session');
  if(!saved)return;
  try{
    const o=JSON.parse(saved);
    document.getElementById('nn').value=o.myName||'';
    document.getElementById('rid').value=o.rid||'';
    // Don't auto-join — let user confirm; just pre-fill
  }catch(e){}
})();
</script>
