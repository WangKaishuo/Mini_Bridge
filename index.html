<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小小桥牌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap');
:root{--bg:#0c1117;--bg2:#161d27;--bg3:#1e2836;--felt:#1a6b3c;--gold:#c9a84c;--text:#ddd8ce;--text2:#9a978f;--accent:#e2c44d;--red:#d94040;--card:#fffef8;--card-sh:rgba(0,0,0,.35)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;gap:6px}
#lobby h1{font-size:2em;color:var(--gold);letter-spacing:6px;margin-bottom:4px}
.fg{display:flex;flex-direction:column;gap:4px;margin:6px 0}
.fg label{font-size:.78em;color:var(--text2)}
.fg input,.fg select{padding:9px 14px;border:1px solid var(--bg3);border-radius:6px;background:var(--bg2);color:var(--text);font-size:.95em;width:240px;outline:none}
.fg input:focus{border-color:var(--gold)}
#lobby button{margin-top:10px;padding:11px 36px;background:var(--felt);color:#fff;border:none;border-radius:6px;font-size:1em;cursor:pointer}
#game{display:none;width:100vw;height:100dvh;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:center;gap:12px;padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--bg3);z-index:10;flex-shrink:0}
.topbar .info{color:var(--accent);font-size:.8em;font-weight:600}
.topbar .btn{padding:3px 10px;background:var(--bg3);border:1px solid #333;color:var(--text2);border-radius:4px;cursor:pointer;font-size:.75em}
.topbar .btn:hover{background:#2a3548}
.topbar .btn.go{background:var(--felt);color:#fff;border-color:var(--felt)}
.mid{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.table{width:min(520px,86vw);aspect-ratio:1;position:relative;background:radial-gradient(ellipse at 50% 45%,#28884e,var(--felt) 60%,#134a2a 100%);border-radius:16px;border:4px solid #3a2f20;box-shadow:0 4px 40px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.15);display:grid;grid-template-areas:". north ." "west center east" ". south .";grid-template-columns:minmax(48px,1fr) 2.5fr minmax(48px,1fr);grid-template-rows:minmax(44px,1fr) 2.2fr minmax(44px,1fr)}
.pz{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;overflow:visible;min-width:0}
.pz.north{grid-area:north}.pz.south{grid-area:south}.pz.west{grid-area:west}.pz.east{grid-area:east}
.pz .lbl{font-size:.7em;padding:2px 8px;border-radius:3px;background:rgba(0,0,0,.4);white-space:nowrap;color:var(--gold);font-weight:600}
.pz .lbl.on{box-shadow:0 0 8px var(--accent);background:rgba(0,0,0,.55)}
.pz .tk{font-size:.6em;color:var(--text2)}
.pz .cds{display:flex;gap:1px;justify-content:center;flex-wrap:nowrap}
.pz.west .cds,.pz.east .cds{flex-direction:column;gap:0}
.table-center{grid-area:center;position:relative;display:flex;align-items:center;justify-content:center}
.tz{width:150px;height:130px;position:relative}
.tc{position:absolute;width:42px;height:60px;background:var(--card);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.68em;font-weight:700;box-shadow:1px 2px 4px var(--card-sh);line-height:1}
.tc.n{top:0;left:50%;transform:translateX(-50%)}.tc.s{bottom:0;left:50%;transform:translateX(-50%)}.tc.w{top:50%;left:0;transform:translateY(-50%)}.tc.e{top:50%;right:0;transform:translateY(-50%)}
.cl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--gold);font-size:1em;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap}
.mc{width:26px;height:36px;border-radius:3px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-size:.55em;font-weight:700;line-height:1;flex-shrink:0;box-shadow:0 1px 2px var(--card-sh)}
.mc.f{background:var(--card)}.mc.b{background:linear-gradient(135deg,#3a5ba0,#2c4a85)}
.mc.b::after{content:'';display:block;width:12px;height:18px;border:1px solid rgba(255,255,255,.12);border-radius:2px}
.mc.playable{border:2px solid var(--accent);cursor:pointer}
.pz.west .mc,.pz.east .mc{width:34px;height:18px;flex-direction:row;gap:2px;font-size:.48em;margin:-3px 0}
.pz.west .mc.b::after,.pz.east .mc.b::after{width:16px;height:8px}
.btm{display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:6px 8px 10px;background:var(--bg2);border-top:1px solid var(--bg3);flex-shrink:0;flex-wrap:wrap;min-height:56px}
.myc{width:50px;height:72px;background:var(--card);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.8em;font-weight:700;line-height:1.1;box-shadow:0 2px 6px var(--card-sh);cursor:default;transition:transform .12s;user-select:none}
.myc.playable{cursor:pointer;border:2px solid var(--accent)}
.myc.playable:hover{transform:translateY(-8px);box-shadow:0 6px 16px rgba(0,0,0,.4)}
.myc .st{font-size:1.15em}
.ss{color:#222}.sh{color:var(--red)}.sd{color:#d4760a}.sc{color:#1a7a42}
#bidbox{display:none;position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:10px;z-index:20;width:min(320px,90vw)}
#bidgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:6px}
.bb{padding:7px 2px;border:none;border-radius:4px;background:var(--bg3);color:var(--text);font-size:.75em;cursor:pointer;text-align:center;font-weight:600}
.bb:hover:not(:disabled){background:var(--felt)}.bb:disabled{opacity:.25;cursor:not-allowed}
.bb.pass{background:#555}.bb.dbl{background:#8e3b3b}.bb.rdbl{background:#2b5ea0}
#bact{display:flex;gap:4px;justify-content:center}
#auc{display:none;position:absolute;top:42px;right:8px;background:rgba(0,0,0,.75);border-radius:6px;padding:6px 8px;font-size:.68em;z-index:5;max-height:180px;overflow-y:auto;min-width:140px}
#auc table{border-collapse:collapse;width:100%}#auc th{color:var(--gold);padding:1px 5px;border-bottom:1px solid var(--bg3);font-weight:600}#auc td{padding:1px 5px;text-align:center}
#spop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
#spop.show{display:flex}
#spop .bx{background:var(--bg2);border:2px solid var(--gold);border-radius:12px;padding:20px 28px;text-align:center;max-width:340px}
#spop h2{color:var(--gold);margin-bottom:6px;font-size:1.05em}
#spop .sv{font-size:1.8em;margin:8px 0;font-weight:700}
#spop .dt{color:var(--text2);font-size:.82em}
#spop button{margin-top:12px;padding:8px 24px;background:var(--felt);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9em}
#hp{display:none;position:fixed;top:0;right:0;width:min(360px,88vw);height:100dvh;background:var(--bg);border-left:2px solid var(--bg3);z-index:50;overflow-y:auto;padding:14px}
#hp.show{display:block}
#hp h2{color:var(--gold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:1em}
#hp .x{cursor:pointer;font-size:1.2em;color:var(--text2);background:none;border:none}
.hi{background:var(--bg2);border-radius:6px;padding:10px;margin-bottom:8px;font-size:.78em}
.hi .bn{color:var(--gold);font-weight:700}.hi .ct{color:var(--accent)}.hi .dt{margin-top:3px;color:var(--text2);font-size:.88em}
@media(max-width:600px){.table{width:94vw}.myc{width:42px;height:60px;font-size:.7em}.mc{width:22px;height:30px;font-size:.48em}.pz.west .mc,.pz.east .mc{width:28px;height:15px;font-size:.42em;margin:-4px 0}.tc{width:36px;height:50px;font-size:.58em}.bb{font-size:.68em;padding:6px 1px}}
</style>
</head>
<body>
<div id="lobby">
  <h1>♠ 小小桥牌 ♣</h1>
  <div class="fg"><label>昵称</label><input id="nn" placeholder="输入昵称" maxlength="12"></div>
  <div class="fg"><label>房间号</label><input id="rid" placeholder="输入房间号" maxlength="20"></div>
  <div class="fg"><label>座位</label><select id="ss"><option value="">旁观</option><option value="N">北</option><option value="E">东</option><option value="S">南</option><option value="W">西</option></select></div>
  <button onclick="joinGame()">加入房间</button>
</div>
<div id="game">
  <div class="topbar"><button class="btn go" id="sbtn" style="display:none" onclick="manualStart()">开始发牌</button><span class="info" id="ib">连接中...</span><button class="btn" onclick="toggleHistory()">📋 历史</button></div>
  <div class="mid">
    <div class="table">
      <div class="pz north"><div class="lbl" id="lN">北 (空位)</div><div class="cds" id="cN"></div><div class="tk" id="tN"></div></div>
      <div class="pz west"><div class="lbl" id="lW">西 (空位)</div><div class="cds" id="cW"></div><div class="tk" id="tW"></div></div>
      <div class="table-center"><div class="tz" id="tz"></div><div class="cl" id="cl"></div></div>
      <div class="pz east"><div class="lbl" id="lE">东 (空位)</div><div class="cds" id="cE"></div><div class="tk" id="tE"></div></div>
      <div class="pz south"><div class="lbl" id="lS">南 (空位)</div><div class="cds" id="cS"></div><div class="tk" id="tS"></div></div>
    </div>
    <div id="auc"></div>
  </div>
  <div class="btm" id="mh"></div>
  <div id="bidbox"><div id="bidgrid"></div><div id="bact"><button class="bb pass" onclick="makeBid('Pass')">Pass</button><button class="bb dbl" id="db" onclick="makeBid('X')" disabled>X</button><button class="bb rdbl" id="rb" onclick="makeBid('XX')" disabled>XX</button></div></div>
  <div id="spop"><div class="bx"><h2 id="st"></h2><div class="dt" id="sd"></div><div class="sv" id="sv"></div><button onclick="closeScore()">下一局</button></div></div>
  <div id="hp"><h2>历史记录<button class="x" onclick="toggleHistory()">×</button></h2><div id="hl"></div></div>
</div>
<script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
<script>
const SU=['C','D','H','S'],SY={S:'♠',H:'♥',D:'♦',C:'♣'},RANKS=['8','9','10','J','Q','K','A'];
const SE=['N','E','S','W'],SN={N:'北',E:'东',S:'南',W:'西'},BS=['C','D','H','S','NT'],LV=[1,2,3,4],TN={1:4,2:5,3:6,4:7};
let myId=Math.random().toString(36).slice(2,10),mySeat=null,myName='',mq=null,rt='',isHost=false,hostId=null,peers={};
let S={phase:'waiting',dealer:0,hands:{N:[],E:[],S:[],W:[]},players:{N:null,E:null,S:null,W:null},auction:[],contract:null,currentTrick:[],trickWins:{NS:0,EW:0},trickLead:null,turnSeat:null,dummy:null,boardNum:0,history:[],allHands:null};
function log(m){console.log('[mb]',m);if(S.phase==='waiting'){const b=document.getElementById('ib');if(b)b.textContent=m;}}
function sc(s){return s==='H'?'sh':s==='D'?'sd':s==='S'?'ss':'sc';}
function scd(s){return s==='H'?'#e74c3c':s==='D'?'#e67e22':s==='S'?'#bbb':'#2ecc71';}
function ms(msg){if(mq&&mq.connected){msg._from=myId;mq.publish(rt,JSON.stringify(msg));}}
function onM(_,p){let d;try{d=JSON.parse(p.toString());}catch(e){return;}if(d._from===myId)return;
if(d.type==='hello'){peers[d._from]={seat:d.seat,name:d.name};log('玩家加入: '+d.name);if(d.seat&&!S.players[d.seat])S.players[d.seat]={peerId:d._from,name:d.name};eH();if(isHost)setTimeout(()=>ms({type:'full_state',state:S}),500);cR();rA();}
else if(d.type==='full_state'){if(d._from===hostId&&!isHost){const h=S.history;S=d.state;if(h.length>S.history.length)S.history=h;rA();}}
else if(d.type==='bid'){if(isHost&&S.phase==='bidding'&&d.seat===S.turnSeat)pB(d.seat,d.bid);}
else if(d.type==='play_card'){if(isHost&&S.phase==='playing'&&d.seat===S.turnSeat)pC(d.seat,d.card);}
else if(d.type==='request_deal'){if(isHost)sNB();}
else if(d.type==='ping'){peers[d._from]=peers[d._from]||{seat:d.seat,name:d.name};}}
function eH(){const a=[myId,...Object.keys(peers)];a.sort();hostId=a[0];isHost=hostId===myId;}
function bS(){if(isHost)ms({type:'full_state',state:S});}
window.joinGame=function(){myName=document.getElementById('nn').value.trim()||'玩家';const rid=document.getElementById('rid').value.trim();mySeat=document.getElementById('ss').value||null;if(!rid){alert('请输入房间号');return;}document.getElementById('lobby').style.display='none';document.getElementById('game').style.display='flex';rt='minibridge/room/'+rid;log('正在连接...');mq=mqtt.connect('wss://broker.hivemq.com:8884/mqtt',{clientId:'mb_'+myId,clean:true,keepalive:30,reconnectPeriod:3000});mq.on('connect',()=>{mq.subscribe(rt,e=>{if(e){log('订阅失败');return;}log('已加入房间 '+rid);if(mySeat)S.players[mySeat]={peerId:myId,name:myName};peers[myId]={seat:mySeat,name:myName};eH();ms({type:'hello',seat:mySeat,name:myName});rA();bBG();});});mq.on('message',onM);mq.on('error',e=>log('错误: '+e.message));mq.on('reconnect',()=>log('重连中...'));setInterval(()=>{if(mq&&mq.connected)ms({type:'ping',seat:mySeat,name:myName});},15000);const sv=localStorage.getItem('minibridge-history');if(sv)try{S.history=JSON.parse(sv);}catch(e){}};
function cR(){if(SE.filter(s=>S.players[s]).length===4&&S.phase==='waiting')sNB();}
function sNB(){S.boardNum++;S.dealer=(S.dealer+(S.boardNum>1?1:0))%4;S.phase='bidding';S.auction=[];S.contract=null;S.currentTrick=[];S.trickWins={NS:0,EW:0};S.trickLead=null;S.dummy=null;S.turnSeat=SE[S.dealer];const dk=[];for(let s of SU)for(let r of RANKS)dk.push({suit:s,rank:r});for(let i=dk.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dk[i],dk[j]]=[dk[j],dk[i]];}S.hands={N:dk.slice(0,7),E:dk.slice(7,14),S:dk.slice(14,21),W:dk.slice(21,28)};for(let s of SE)S.hands[s].sort((a,b)=>{const d=SU.indexOf(a.suit)-SU.indexOf(b.suit);return d?d:RANKS.indexOf(a.rank)-RANKS.indexOf(b.rank);});S.allHands=JSON.parse(JSON.stringify(S.hands));rA();bS();}
function gLC(){for(let i=S.auction.length-1;i>=0;i--){const b=S.auction[i].bid;if(b!=='Pass'&&b!=='X'&&b!=='XX')return{...S.auction[i],index:i};}return null;}
function bv(b){if(b==='Pass'||b==='X'||b==='XX')return-1;return parseInt(b[0])*10+BS.indexOf(b.slice(1));}
function iV(seat,bid){if(bid==='Pass')return true;const lc=gLC();if(bid==='X'){if(!lc)return false;if((SE.indexOf(seat)%2)===(SE.indexOf(lc.seat)%2))return false;for(let i=lc.index+1;i<S.auction.length;i++)if(S.auction[i].bid==='X'||S.auction[i].bid==='XX')return false;for(let i=lc.index+1;i<S.auction.length;i++)if(S.auction[i].bid!=='Pass')return false;return true;}if(bid==='XX'){let x=-1;for(let i=S.auction.length-1;i>=0;i--){if(S.auction[i].bid==='X'){x=i;break;}if(S.auction[i].bid!=='Pass')break;}if(x===-1)return false;return(SE.indexOf(seat)%2)!==(SE.indexOf(S.auction[x].seat)%2);}return lc?bv(bid)>bv(lc.bid):true;}
function pB(seat,bid){S.auction.push({seat,bid});const a=S.auction;if(a.length>=4){if(a.slice(-3).every(x=>x.bid==='Pass')&&a.length>3&&a.some(x=>x.bid!=='Pass'&&x.bid!=='X'&&x.bid!=='XX')){fA();return;}if(a.slice(-4).every(x=>x.bid==='Pass')){S.phase='scoring';S.contract=null;rB(0,null);rA();bS();sS('全Pass','本局流局',0);return;}}S.turnSeat=SE[(SE.indexOf(seat)+1)%4];rA();bS();}
function fA(){const lc=gLC(),bid=lc.bid,lv=parseInt(bid[0]),su=bid.slice(1),side=SE.indexOf(lc.seat)%2;let dec=null;for(let a of S.auction)if(a.bid!=='Pass'&&a.bid!=='X'&&a.bid!=='XX'&&a.bid.slice(1)===su&&SE.indexOf(a.seat)%2===side){dec=a.seat;break;}let db=false,rd=false;for(let i=S.auction.length-1;i>=0;i--){if(S.auction[i].bid==='XX'){rd=true;break;}if(S.auction[i].bid==='X'){db=true;break;}if(S.auction[i].bid!=='Pass')break;}S.contract={level:lv,suit:su,doubled:db,redoubled:rd,declarer:dec};const di=SE.indexOf(dec);S.dummy=SE[(di+2)%4];S.trickLead=SE[(di+1)%4];S.turnSeat=S.trickLead;S.phase='playing';S.currentTrick=[];rA();bS();}
function pC(seat,card){const h=S.hands[seat],idx=h.findIndex(c=>c.suit===card.suit&&c.rank===card.rank);if(idx===-1)return;h.splice(idx,1);S.currentTrick.push({seat,card});if(S.currentTrick.length===4){const w=tW(S.currentTrick,S.contract.suit),ws=(SE.indexOf(w)%2===0)?'NS':'EW';S.trickWins[ws]++;rA();bS();setTimeout(()=>{S.currentTrick=[];S.trickLead=w;S.turnSeat=w;if(S.trickWins.NS+S.trickWins.EW===7)eP();else{rA();bS();}},1200);return;}S.turnSeat=SE[(SE.indexOf(seat)+1)%4];rA();bS();}
function tW(tr,ts){const ls=tr[0].card.suit;let best=tr[0];for(let i=1;i<tr.length;i++){const c=tr[i];if(ts!=='NT'){if(c.card.suit===ts&&best.card.suit!==ts)best=c;else if(c.card.suit===ts&&best.card.suit===ts&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;else if(c.card.suit===ls&&best.card.suit===ls&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;}else{if(c.card.suit===ls&&best.card.suit===ls&&RANKS.indexOf(c.card.rank)>RANKS.indexOf(best.card.rank))best=c;}}return best.seat;}
function eP(){S.phase='scoring';const c=S.contract,ds=(SE.indexOf(c.declarer)%2===0)?'NS':'EW',dt=S.trickWins[ds],nd=TN[c.level],made=dt-nd,score=cSc(c,made);rB(score,c,dt);rA();bS();sS(fC(c),'庄家: '+SN[c.declarer]+' | '+(made>=0?(made===0?'完成':'超'+made+'墩'):'宕'+(-made))+' | '+dt+'/7墩',score);}
function cSc(c,made){const{level:l,suit:s,doubled:d,redoubled:r}=c;if(made>=0){let tp=s==='NT'?30+(l-1)*20:l*20;let m=1;if(d)m=2;if(r)m=4;tp*=m;let b=50;if(tp>=50)b=250;if(l===4)b=750;let e=0;if(d)e+=100;if(r)e+=200;let o=0;if(made>0){if(!d&&!r)o=made*20;else if(d)o=made*100;else o=made*200;}return tp+b+e+o;}const dn=-made;if(!d&&!r)return-(dn*50);if(d){let p=0;if(dn>=1)p+=100;if(dn>=2)p+=200;if(dn>=3)p+=200;for(let i=4;i<=dn;i++)p+=300;return-p;}let p=0;if(dn>=1)p+=200;if(dn>=2)p+=400;if(dn>=3)p+=400;for(let i=4;i<=dn;i++)p+=600;return-p;}
function rB(sc,ct,dt){S.history.push({boardNum:S.boardNum,hands:S.allHands,auction:[...S.auction],contract:ct?{...ct}:null,declarerTricks:dt||0,score:sc,players:JSON.parse(JSON.stringify(S.players)),timestamp:new Date().toLocaleString('zh-CN')});localStorage.setItem('minibridge-history',JSON.stringify(S.history));}
function rA(){rT();rMH();rTr();rAu();rCl();uBB();uTB();}
window.manualStart=function(){if(isHost&&S.phase==='waiting'){for(let s of SE)if(!S.players[s])S.players[s]={peerId:'bot-'+s,name:'机器人'+SN[s]};sNB();}};
function uTB(){const b=document.getElementById('ib'),sb=document.getElementById('sbtn'),pc=Object.keys(peers).length-1,sc2=SE.filter(s=>S.players[s]).length;if(S.phase==='waiting')b.textContent=(pc>0?'已连接'+pc+'人':'等待玩家...')+' · '+sc2+'/4就座'+(mySeat?' · '+SN[mySeat]:'')+(isHost?' · 房主':'');else if(S.phase==='bidding')b.textContent='第'+S.boardNum+'局 · 叫牌 · '+SN[S.turnSeat];else if(S.phase==='playing')b.textContent='第'+S.boardNum+'局 · '+fC(S.contract)+' · '+SN[S.turnSeat];else b.textContent='第'+S.boardNum+'局 · 结束';if(sb)sb.style.display=(S.phase==='waiting'&&isHost&&sc2>=2)?'inline-block':'none';}
function rT(){for(let s of SE){const el=document.getElementById('c'+s);if(!el)continue;el.innerHTML='';if(mySeat&&s===mySeat)continue;const hand=S.hands[s]||[],canSee=(!mySeat)||(S.phase==='playing'&&s===S.dummy)||(S.phase==='scoring');const isDT=mySeat&&S.dummy===s&&S.contract&&S.contract.declarer===mySeat&&S.turnSeat===s&&S.phase==='playing';for(let card of hand){const d=document.createElement('div');if(canSee){d.className='mc f '+sc(card.suit);d.innerHTML='<span>'+SY[card.suit]+'</span><span>'+card.rank+'</span>';if(isDT&&iLP(s,card)){d.classList.add('playable');d.onclick=((st,cd)=>()=>{if(isHost)pC(st,cd);else ms({type:'play_card',seat:st,card:cd});})(s,card);}}else d.className='mc b';el.appendChild(d);}const lbl=document.getElementById('l'+s),p=S.players[s];lbl.textContent=p?SN[s]+' '+p.name:SN[s]+' (空位)';lbl.classList.toggle('on',S.turnSeat===s);const tk=document.getElementById('t'+s);tk.textContent=(S.phase==='playing'||S.phase==='scoring')?S.trickWins[(SE.indexOf(s)%2===0)?'NS':'EW']+'墩':'';}if(mySeat){const lbl=document.getElementById('l'+mySeat),p=S.players[mySeat];if(lbl){lbl.textContent=p?SN[mySeat]+' '+p.name:SN[mySeat];lbl.classList.toggle('on',S.turnSeat===mySeat);}const tk=document.getElementById('t'+mySeat);if(tk)tk.textContent=(S.phase==='playing'||S.phase==='scoring')?S.trickWins[(SE.indexOf(mySeat)%2===0)?'NS':'EW']+'墩':'';}}
function rMH(){const el=document.getElementById('mh');el.innerHTML='';if(!mySeat)return;const hand=S.hands[mySeat]||[],imt=S.turnSeat===mySeat&&S.phase==='playing';for(let card of hand){const d=document.createElement('div');d.className='myc '+sc(card.suit);d.innerHTML='<span class="st">'+SY[card.suit]+'</span><span>'+card.rank+'</span>';if(imt&&iLP(mySeat,card)){d.classList.add('playable');d.onclick=((st,cd)=>()=>{if(isHost)pC(st,cd);else ms({type:'play_card',seat:st,card:cd});})(mySeat,card);}el.appendChild(d);}}
function iLP(seat,card){if(S.currentTrick.length===0)return true;const ls=S.currentTrick[0].card.suit;return card.suit===ls||!S.hands[seat].some(c=>c.suit===ls);}
function rTr(){const z=document.getElementById('tz');z.innerHTML='';const pm={N:'n',E:'e',S:'s',W:'w'};for(let p of S.currentTrick){const d=document.createElement('div');d.className='tc '+pm[p.seat]+' '+sc(p.card.suit);d.innerHTML='<span style="font-size:1.15em">'+SY[p.card.suit]+'</span><span>'+p.card.rank+'</span>';z.appendChild(d);}}
function rAu(){const el=document.getElementById('auc');if(S.auction.length===0&&S.phase!=='bidding'){el.style.display='none';return;}if(S.phase!=='bidding'&&S.phase!=='playing'){el.style.display='none';return;}el.style.display='block';let h='<table><tr>';for(let i=0;i<4;i++)h+='<th>'+SN[SE[(S.dealer+i)%4]]+'</th>';h+='</tr><tr>';for(let i=0;i<S.auction.length;i++){h+='<td>'+fB(S.auction[i].bid)+'</td>';if((i+1)%4===0)h+='</tr><tr>';}h+='</tr></table>';el.innerHTML=h;}
function fB(b){if(b==='Pass')return'<span style="color:#777">P</span>';if(b==='X')return'<span style="color:#e74c3c">X</span>';if(b==='XX')return'<span style="color:#5dade2">XX</span>';const s=b.slice(1);return s==='NT'?b[0]+'NT':b[0]+'<span style="color:'+scd(s)+'">'+SY[s]+'</span>';}
function rCl(){document.getElementById('cl').textContent=(S.contract&&S.phase==='playing')?fC(S.contract):'';}
function fC(c){if(!c)return'';let s=c.level+(c.suit==='NT'?'NT':SY[c.suit]);if(c.redoubled)s+='XX';else if(c.doubled)s+='X';return s+' '+SN[c.declarer];}
function uBB(){const box=document.getElementById('bidbox');if(S.phase!=='bidding'||S.turnSeat!==mySeat){box.style.display='none';return;}box.style.display='block';document.querySelectorAll('.bb[data-bid]').forEach(b=>{b.disabled=!iV(mySeat,b.dataset.bid);});document.getElementById('db').disabled=!iV(mySeat,'X');document.getElementById('rb').disabled=!iV(mySeat,'XX');}
function bBG(){const g=document.getElementById('bidgrid');g.innerHTML='';for(let l of LV)for(let s of BS){const bid=l+s,btn=document.createElement('button');btn.className='bb';btn.dataset.bid=bid;btn.innerHTML=s==='NT'?l+'NT':l+SY[s];btn.onclick=()=>makeBid(bid);g.appendChild(btn);}}
window.makeBid=function(bid){if(!mySeat||S.turnSeat!==mySeat||!iV(mySeat,bid))return;if(isHost)pB(mySeat,bid);else ms({type:'bid',seat:mySeat,bid});};
function sS(t,d,sc2){document.getElementById('st').textContent=t;document.getElementById('sd').textContent=d;const v=document.getElementById('sv');v.textContent=sc2===0?'—':(sc2>0?'+'+sc2:''+sc2);v.style.color=sc2>=0?'#2ecc71':'#e74c3c';document.getElementById('spop').classList.add('show');}
window.closeScore=function(){document.getElementById('spop').classList.remove('show');if(isHost)sNB();else ms({type:'request_deal'});};
window.toggleHistory=function(){const p=document.getElementById('hp');p.classList.toggle('show');if(p.classList.contains('show'))rH();};
function rH(){const l=document.getElementById('hl');if(!S.history.length){l.innerHTML='<div style="color:var(--text2)">暂无</div>';return;}let h='';for(let i=S.history.length-1;i>=0;i--){const r=S.history[i],cs=r.contract?fC(r.contract):'全Pass',ss=r.score>0?'+'+r.score:''+r.score;let rs='';if(r.contract){const m=r.declarerTricks-TN[r.contract.level];rs=m>=0?(m===0?'完成':'超'+m+'墩'):'宕'+(-m);}else rs='流局';let hs='';if(r.hands)for(let s of SE){const n=r.players[s]?r.players[s].name:SN[s];hs+=SN[s]+'('+n+'): '+r.hands[s].map(c=>SY[c.suit]+c.rank).join(' ')+'<br>';}let as='';if(r.auction&&r.auction.length)as=r.auction.map(a=>{if(a.bid==='Pass')return'P';if(a.bid==='X'||a.bid==='XX')return a.bid;const su=a.bid.slice(1);return a.bid[0]+(su==='NT'?'NT':SY[su]);}).join('-');h+='<div class="hi"><div><span class="bn">第'+r.boardNum+'局</span> · '+r.timestamp+'</div><div class="ct">'+cs+' · '+rs+'</div><div class="res">得分: <span style="color:'+(r.score>=0?'#2ecc71':'#e74c3c')+'">'+ss+'</span></div>'+(as?'<div class="dt">叫牌: '+as+'</div>':'')+'<div class="dt">'+hs+'</div></div>';}l.innerHTML=h;}
</script>
</body>
</html>
